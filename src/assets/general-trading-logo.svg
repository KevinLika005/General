    <path d="M756 352h74l-250 251h-74l250-251z" fill="url(#silver)"/>
    <path d="M812 451h74L699 639l132 132h-86L626 653l186-202z" fill="url(#silver)"/>
    <path d="M783 640h49l48 131h-123l26-27h49l-24-64-25 25h-59l59-65z" fill="url(#silver)"/>
    <path d="M782 372h48v237l-48-53V372z" fill="url(#silver)"/>
  </g>

  <g text-anchor="middle">
