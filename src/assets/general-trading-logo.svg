<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 210 1200 770" role="img" aria-labelledby="title desc">
  <title id="title">General Trading logo</title>
  <desc id="desc">Metallic gold and silver General Trading logo with monogram emblem.</desc>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9c6207"/>
      <stop offset="32%" stop-color="#d8a43b"/>
      <stop offset="50%" stop-color="#ffe8a0"/>
      <stop offset="68%" stop-color="#d39a2d"/>
      <stop offset="100%" stop-color="#8f5d08"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9fa3aa"/>
      <stop offset="32%" stop-color="#d4d7dc"/>
      <stop offset="50%" stop-color="#f6f6f7"/>
      <stop offset="72%" stop-color="#c4c8cf"/>
      <stop offset="100%" stop-color="#8c9199"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity=".12"/>
